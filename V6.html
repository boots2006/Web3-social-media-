<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Global Social Feed</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .box {
      width: 500px;
      margin: auto;
      padding: 15px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      width: 95%;
    }

    button {
      background: #3b82f6;
      color: white;
      border: none;
      cursor: pointer;
    }

    .post {
      background: #1f2937;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
    }

    img {
      max-width: 100%;
      margin-top: 5px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>🌍 Global Post Feed</h2>

  <input id="username" placeholder="Your name">
  <input id="text" placeholder="Write post">
  <input id="image" placeholder="Image URL (optional)">

  <button onclick="addPost()">Publish</button>

  <hr>

  <div id="feed"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---------------- POST ----------------

window.addPost = async function () {

  const name = document.getElementById("username").value;
  const text = document.getElementById("text").value;
  const image = document.getElementById("image").value;

  if (!name || !text) return alert("Fill all fields");

  await addDoc(collection(db, "posts"), {
    name,
    text,
    image,
    likes: 0,
    time: Date.now()
  });

  document.getElementById("text").value = "";
  document.getElementById("image").value = "";
};

// ---------------- REALTIME FEED ----------------

const q = query(collection(db, "posts"), orderBy("time", "desc"));

onSnapshot(q, (snapshot) => {

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach(doc => {

    const p = doc.data();
    const id = doc.id;

    feed.innerHTML += `
      <div class="post">
        <b>@${p.name}</b>
        <p>${p.text}</p>

        ${p.image ? `<img src="${p.image}">` : ""}

        <p>👍 ${p.likes} likes</p>

        <button onclick="likePost('${id}', ${p.likes})">Like</button>
      </div>
    `;
  });
});

// ---------------- LIKE ----------------

import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

window.likePost = async function (id, likes) {

  const ref = doc(db, "posts", id);

  await updateDoc(ref, {
    likes: likes + 1
  });
};

</script>

</body>
    </html>
