<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pro Web3 Social App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .box {
      width: 400px;
      margin: auto;
      padding: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      width: 90%;
    }

    button {
      cursor: pointer;
      background: #3b82f6;
      border: none;
      color: white;
    }

    .post {
      background: #1f2937;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
    }

    img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 5px;
    }

    .small {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Register / Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>

  <p id="userInfo"></p>

  <hr>

  <h2>Create Post</h2>

  <input id="text" placeholder="Write post">
  <input id="image" placeholder="Image URL (optional)">
  <button onclick="addPost()">Post</button>

  <hr>

  <h2>Feed</h2>
  <div id="feed"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  updateDoc,
  doc,
  arrayUnion
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔥 TON CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ---------------- AUTH ----------------

window.register = async function () {
  const email = email.value;
  const password = password.value;

  await createUserWithEmailAndPassword(auth, email, password);
};

window.login = async function () {
  const email = email.value;
  const password = password.value;

  await signInWithEmailAndPassword(auth, email, password);
};

window.logout = async function () {
  await signOut(auth);
};

// ---------------- POSTS ----------------

window.addPost = async function () {
  if (!auth.currentUser) return alert("Login required");

  const text = document.getElementById("text").value;
  const image = document.getElementById("image").value;

  await addDoc(collection(db, "posts"), {
    text,
    image,
    email: auth.currentUser.email,
    likes: [],
    comments: [],
    time: Date.now()
  });

  document.getElementById("text").value = "";
  document.getElementById("image").value = "";
};

// ---------------- LIKE ----------------

window.likePost = async function (id, likes) {
  const user = auth.currentUser.email;

  const ref = doc(db, "posts", id);

  await updateDoc(ref, {
    likes: arrayUnion(user)
  });
};

// ---------------- COMMENT ----------------

window.commentPost = async function (id) {
  const comment = prompt("Comment:");

  if (!comment) return;

  const ref = doc(db, "posts", id);

  await updateDoc(ref, {
    comments: arrayUnion(comment)
  });
};

// ---------------- FEED ----------------

const q = query(collection(db, "posts"), orderBy("time", "desc"));

onSnapshot(q, (snapshot) => {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach(docSnap => {
    const p = docSnap.data();
    const id = docSnap.id;

    feed.innerHTML += `
      <div class="post">
        <b>${p.email}</b>
        <p>${p.text}</p>

        ${p.image ? `<img src="${p.image}">` : ""}

        <p>❤️ ${p.likes.length} likes</p>

        <button onclick="likePost('${id}')">Like</button>
        <button onclick="commentPost('${id}')">Comment</button>

        <div class="small">
          ${p.comments.map(c => `<p>💬 ${c}</p>`).join("")}
        </div>
      </div>
    `;
  });
});

// ---------------- USER STATUS ----------------

onAuthStateChanged(auth, (user) => {
  document.getElementById("userInfo").innerText =
    user ? "Logged in: " + user.email : "Not logged in";
});

</script>

</body>
  </html>
