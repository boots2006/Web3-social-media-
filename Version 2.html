<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web3 Social Feed V2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .container {
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #111827;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 15px;
    }

    .sidebar p {
      margin: 10px 0;
      color: #cbd5e1;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #3b82f6;
      color: white;
    }

    .post {
      background: #1f2937;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
    }

    .like-btn {
      margin-top: 8px;
      background: transparent;
      border: 1px solid #3b82f6;
    }

    .like-btn:hover {
      background: #3b82f6;
    }

    .user-box {
      margin-bottom: 15px;
    }

    .small {
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Web3 Feed</h2>
    <p>Home</p>
    <p>Profile</p>
    <p>Trending</p>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <h1>Social Feed V2</h1>

    <!-- USER -->
    <div class="user-box">
      <input id="username" placeholder="Enter username">
      <button onclick="setUser()">Set User</button>
      <p class="small" id="currentUser">No user set</p>
    </div>

    <!-- POST -->
    <div>
      <input id="postInput" placeholder="Write a post...">
      <button onclick="addPost()">Post</button>
    </div>

    <div id="feed"></div>

  </main>

</div>

<script>
  let posts = JSON.parse(localStorage.getItem("posts")) || [];
  let user = localStorage.getItem("user") || "";

  document.getElementById("currentUser").innerText =
    user ? "User: " + user : "No user set";

  function setUser() {
    const username = document.getElementById("username").value;
    if (!username) return;

    user = username;
    localStorage.setItem("user", user);

    document.getElementById("currentUser").innerText = "User: " + user;
  }

  function addPost() {
    const text = document.getElementById("postInput").value;
    if (!text || !user) return;

    posts.unshift({
      user: user,
      text: text,
      likes: 0
    });

    document.getElementById("postInput").value = "";

    save();
    render();
  }

  function likePost(index) {
    posts[index].likes++;
    save();
    render();
  }

  function save() {
    localStorage.setItem("posts", JSON.stringify(posts));
  }

  function render() {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    posts.forEach((post, index) => {
      feed.innerHTML += `
        <div class="post">
          <b>@${post.user}</b>
          <p>${post.text}</p>
          <button class="like-btn" onclick="likePost(${index})">
            ❤️ ${post.likes}
          </button>
        </div>
      `;
    });
  }

  render();
</script>

</body>
</html>
